<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff;
    }

    header {
      padding: 10px;
      background: #ffb6c1;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .content {
      padding: 10px;
      padding-bottom: 70px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    .nav-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
    }

    .active {
      color: pink;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: pink;
      color: white;
      margin-top: 5px;
      width: 100%;
    }

    textarea {
      width: 100%;
      border-radius: 10px;
      padding: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <input type="text" placeholder="Tìm kiếm nhân vật..." />
</header>

<!-- HOME -->
<div id="home" class="content">
  <h3>Đề xuất</h3>
  <div class="card">Nhân vật A</div>
  <div class="card">Nhân vật B</div>
</div>

<!-- CHAT -->
<div id="chat" class="content hidden">
  <h3>Yêu thích</h3>
  <div class="card">❤️ Nhân vật đã lưu</div>

  <h3>Đang chat</h3>
  <div class="card">Chat 1</div>
</div>

<!-- CREATE -->
<div id="create" class="content hidden">
  <h3>Tạo nhân vật</h3>

  <div class="card">
    <h4>1. Cài đặt cơ bản</h4>
    <input placeholder="Tên (0-40)" maxlength="40">
    <input placeholder="Giới tính">
    <input type="file">
    <input placeholder="Tag">
    <input placeholder="Slogan (0-100)" maxlength="100">
    <textarea placeholder="Ghi chú"></textarea>

    <select>
      <option>Công khai</option>
      <option>Riêng tư</option>
    </select>
  </div>

  <div class="card">
    <h4>2. Thông tin công khai</h4>
    <textarea maxlength="3000"></textarea>
  </div>

  <div class="card">
    <h4>3. Tính cách</h4>
    <textarea maxlength="60000"></textarea>
  </div>

  <div class="card">
    <h4>4. Đối thoại mở đầu</h4>
    <textarea placeholder="Tiểu sử (0-5000)" maxlength="5000"></textarea>
    <textarea placeholder="Tin nhắn đầu tiên (0-3000)" maxlength="3000"></textarea>
  </div>

  <button>Tạo nhân vật</button>
</div>

<!-- PROFILE -->
<div id="profile" class="content hidden">
  <h3>Trang cá nhân</h3>

  <div class="card">
    <h4>Nhiệm vụ</h4>
    <button>Điểm danh</button>
    <button>Mời bạn (200⭐)</button>
  </div>

  <div class="card">
    <h4>Cài đặt</h4>
    <button>Chỉnh sửa {{user}}</button>
  </div>

  <button onclick="loginGoogle()">Đăng nhập Google</button>
  <button onclick="loginEmail()">Đăng nhập Email</button>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-btn active" onclick="showTab('home')">🏠</div>
  <div class="nav-btn" onclick="showTab('chat')">💬</div>
  <div class="nav-btn" onclick="showTab('create')">➕</div>
  <div class="nav-btn" onclick="showTab('profile')">👤</div>
</div>

<!-- SCRIPT -->
<script>
function showTab(tab) {
  document.querySelectorAll('.content').forEach(e => e.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');

  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>: <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Google login
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// Email login
function loginEmail() {
  const email = prompt("Email:");
  const pass = prompt("Password:");

  auth.signInWithEmailAndPassword(email, pass)
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, pass);
    });
}
</script>
</html>
