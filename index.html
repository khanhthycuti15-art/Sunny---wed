<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Neo VN AI Chat</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#eaf6ff,#ffffff);
    color:#222;
}

/* Desktop */
#desktop{
    display:flex;
    gap:15px;
    padding:20px;
}

.app{
    width:110px;
    height:110px;
    border-radius:18px;
    background:#dff1ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.app:hover{background:#cfe9ff}

/* Window */
.window{
    position:absolute;
    top:60px;
    left:60px;
    width:420px;
    height:560px;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:none;
    flex-direction:column;
}

.titlebar{
    background:#d7f0ff;
    padding:10px;
    font-weight:bold;
    border-radius:15px 15px 0 0;
}

.content{
    padding:10px;
    flex:1;
    overflow:auto;
}

input, textarea, select, button{
    width:100%;
    margin-top:6px;
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#7cc7ff;
    color:white;
    border:none;
    cursor:pointer;
}

.chatbox{
    height:280px;
    overflow:auto;
    background:#f5fbff;
    padding:8px;
    border-radius:10px;
}

.msg-user{color:#2a7fff}
.msg-ai{color:#ff5c8a}

.badge{
    font-size:12px;
    padding:2px 6px;
    border-radius:8px;
    background:#e8f6ff;
    margin-left:5px;
}

.small{
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="desktop">
    <div class="app" onclick="openWin('charWin')">👤<br>Characters</div>
    <div class="app" onclick="openWin('chatWin')">💬<br>Chat</div>
    <div class="app" onclick="daily()">🎁<br>Daily</div>
</div>

<!-- CHARACTER WINDOW -->
<div class="window" id="charWin">
<div class="titlebar">Create Character (VN AI)</div>
<div class="content">

<input id="name" placeholder="Tên nhân vật">
<input id="avatar" placeholder="URL ảnh avatar">

<textarea id="desc" placeholder="Mô tả nhân vật (background)"></textarea>

<textarea id="prompt" placeholder="AI personality prompt (rất quan trọng)"></textarea>

<select id="gender">
<option>Nam</option>
<option>Nữ</option>
<option>Khác</option>
</select>

<input id="age" placeholder="Tuổi">

<select id="mood">
<option>Hiền</option>
<option>Lạnh lùng</option>
<option>Dịu dàng</option>
<option>Tsundere</option>
<option>Yandere (nhẹ)</option>
</select>

<button onclick="createChar()">+ Tạo nhân vật</button>

<div id="list"></div>

</div>
</div>

<!-- CHAT WINDOW -->
<div class="window" id="chatWin">
<div class="titlebar">Chat AI Character</div>
<div class="content">

<select id="charSelect"></select>

<div id="info"></div>

<div class="chatbox" id="chatbox"></div>

<input id="msg" placeholder="Nhập tin nhắn...">
<button onclick="send()">Gửi</button>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("neo_vn")||"{}");
if(!data.chars) data.chars={};
if(!data.stars) data.stars=0;

function save(){
    localStorage.setItem("neo_vn",JSON.stringify(data));
}

function openWin(id){
    document.getElementById(id).style.display="flex";
    if(id=="charWin") render();
    if(id=="chatWin") loadChars();
}

/* CREATE CHARACTER */
function createChar(){
    let c = {
        name:name.value,
        avatar:avatar.value,
        desc:desc.value,
        prompt:prompt.value,
        gender:gender.value,
        age:age.value,
        mood:mood.value,
        affinity:0,
        memory:[],
        chat:[]
    };

    if(!c.name) return;

    data.chars[c.name]=c;
    save();
    render();
    alert("Đã tạo nhân vật!");
}

/* LIST */
function render(){
    list.innerHTML = Object.values(data.chars).map(c=>
        `<div class="small">👤 ${c.name} | ❤️ ${c.affinity}</div>`
    ).join("");
}

/* CHAT LOAD */
function loadChars(){
    charSelect.innerHTML = Object.keys(data.chars)
    .map(c=>`<option>${c}</option>`).join("");

    update();
}

charSelect?.addEventListener("change",update);

function update(){
    let c = data.chars[charSelect.value];
    if(!c) return;

    info.innerHTML = `
    <div>
    <b>${c.name}</b>
    <span class="badge">${c.mood}</span><br>
    ❤️ Affinity: ${c.affinity}<br>
    </div>
    `;

    chatbox.innerHTML = c.chat.map(m=>
        `<div>${m}</div>`
    ).join("");
}

/* AI LOGIC */
function send(){
    let c = data.chars[charSelect.value];
    if(!c) return;

    let t = msg.value;
    if(!t) return;

    c.chat.push("🧑 Bạn: "+t);

    c.memory.push(t);
    if(c.memory.length>8) c.memory.shift();

    let reply = ai(c,t);

    c.chat.push("💬 "+c.name+": "+reply);

    if(t.includes("yêu")||t.includes("cute")) c.affinity++;

    save();
    msg.value="";
    update();
}

/* SIMPLE AI PERSONALITY ENGINE */
function ai(c,t){

    let base = c.prompt || "";

    if(c.mood=="Lạnh lùng"){
        if(c.affinity<2) return "…Ừ.";
        return "Tôi đang nghe.";
    }

    if(c.mood=="Tsundere"){
        if(t.includes("yêu")) return "Đ-đừng nói vậy! 😳";
        return "Hừ…";
    }

    if(c.mood=="Dịu dàng"){
        return "Ừm… mình đang nghe bạn đây 💙";
    }

    if(c.mood=="Yandere (nhẹ)"){
        if(t.includes("ai khác")){
            return "Bạn đang nói về ai…?";
        }
        return "Chỉ cần bạn ở đây là đủ…";
    }

    if(c.affinity>5){
        return "Mình bắt đầu thích bạn nhiều hơn rồi…";
    }

    return "Mình hiểu rồi.";
}

/* DAILY STAR */
function daily(){
    let last = localStorage.getItem("day");
    let today = new Date().toDateString();

    if(last==today){
        alert("Hôm nay đã nhận rồi!");
        return;
    }

    data.stars += 3;
    localStorage.setItem("day",today);
    save();

    alert("+3 sao!");
}
</script>

</body>
</html>
