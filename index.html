<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lumi Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0c18;
    color: white;
}

#app {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

#top {
    display: flex;
    gap: 10px;
    align-items: center;
}

select, input, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

#chat {
    height: 65vh;
    overflow-y: auto;
    background: #14162a;
    border-radius: 10px;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #2a2d55;
}

.msg { margin: 8px 0; }
.user { text-align: right; color: #7dd3fc; }
.bot { text-align: left; color: #fda4af; }

#status {
    font-size: 13px;
    color: #a1a1aa;
}
</style>
</head>

<body>

<div id="app">

<div id="top">
    <select id="char" onchange="switchChar()">
        <option value="Luna">Luna</option>
        <option value="Noir">Noir</option>
        <option value="Mira">Mira</option>
    </select>

    <div id="status"></div>
</div>

<div id="chat"></div>

<input id="input" placeholder="Nhập tin nhắn...">
<button onclick="send()">Gửi</button>

</div>

<script>

/* ======================
   CHARACTER SYSTEM
====================== */

let chars = {
    Luna: createChar("dịu dàng"),
    Noir: createChar("lạnh lùng"),
    Mira: createChar("ghen nhẹ")
};

let current = "Luna";

function createChar(baseMood) {
    return {
        mood: baseMood,
        baseMood: baseMood,
        affection: 50,
        memory: []
    };
}

/* ======================
   SAVE / LOAD
====================== */

function save() {
    localStorage.setItem("lumi_data", JSON.stringify(chars));
}

function load() {
    let data = JSON.parse(localStorage.getItem("lumi_data") || "{}");
    chars = { ...chars, ...data };
}

/* ======================
   MOOD ENGINE
====================== */

function updateMood(c, text) {

    if (text.includes("yêu")) {
        c.mood = "làm nũng";
        c.affection += 10;
    }

    if (text.includes("ghen")) {
        c.mood = "ghen";
        c.affection -= 5;
    }

    if (text.includes("say") || text.includes("rượu")) {
        c.mood = "say";
    }

    if (text.includes("xin lỗi")) {
        c.mood = "dịu lại";
        c.affection += 5;
    }

    if (text.includes("bỏ")) {
        c.mood = "lạnh";
        c.affection -= 10;
    }

    c.affection = Math.max(0, Math.min(100, c.affection));
}

/* ======================
   BOT RESPONSE
====================== */

function reply(c, text) {

    updateMood(c, text);

    let mem = c.memory.slice(-5).join(" ");

    if (c.affection > 80) {
        return "Tôi… thích bạn nhiều hơn tôi nghĩ.";
    }

    if (c.affection < 30) {
        return "Đừng nói chuyện với tôi nữa.";
    }

    if (c.mood === "ghen") {
        return "Bạn đang nói chuyện với ai vậy?";
    }

    if (c.mood === "say") {
        return "Đầu tôi hơi quay… đừng đi xa.";
    }

    if (c.mood === "làm nũng") {
        return "Bạn làm tôi xao động đó…";
    }

    if (mem.includes("yêu")) {
        return "Tôi vẫn nhớ câu đó…";
    }

    return "Tôi đang nghe bạn.";
}

/* ======================
   CHAT SYSTEM
====================== */

let chat = document.getElementById("chat");

function render() {
    chat.innerHTML = "";

    chars[current].memory.forEach(m => {
        let div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerText = (m.role === "user" ? "Bạn: " : current + ": ") + m.text;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;

    document.getElementById("status").innerText =
        `Mood: ${chars[current].mood} | Affection: ${chars[current].affection}`;
}

/* ======================
   SEND
====================== */

function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    let c = chars[current];

    c.memory.push({ role: "user", text });

    let bot = reply(c, text);

    c.memory.push({ role: "bot", text: bot });

    save();

    input.value = "";
    render();
}

/* ======================
   SWITCH CHAR
====================== */

function switchChar() {
    current = document.getElementById("char").value;
    render();
}

/* ======================
   INIT
====================== */

load();
render();

</script>

</body>
</html>
