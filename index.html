<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NeoVN Social AI</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f6fbff;
}

/* TOP SETTINGS */
#settings{
    position:absolute;
    top:10px;
    left:10px;
    cursor:pointer;
}

/* MAIN PAGE */
.page{
    display:none;
    padding:15px;
}
.page.active{
    display:block;
}

/* TOP SEARCH */
#searchBar{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* CHAR CARD */
.card{
    background:#e9f5ff;
    padding:10px;
    margin:8px 0;
    border-radius:12px;
}

/* BOTTOM NAV */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#dff3ff;
    justify-content:space-around;
    padding:10px 0;
}

.navbtn{
    cursor:pointer;
    text-align:center;
    flex:1;
}

/* CENTER + BUTTON */
#plus{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:#7ec8ff;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* CHAT */
#chatbox{
    height:300px;
    overflow:auto;
    background:white;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* INPUT */
input,textarea,select,button{
    width:100%;
    margin-top:5px;
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#7ec8ff;
    color:white;
    border:none;
}

/* TASK */
.task{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="settings">⚙</div>

<!-- HOME -->
<div class="page active" id="home">
<input id="search" placeholder="Search character..." oninput="renderHome()">

<h3>Recommended</h3>
<div id="recom"></div>
</div>

<!-- CHAT -->
<div class="page" id="chat">
<h3>Chat</h3>
<div id="fav"></div>
<div id="chatbox"></div>
<input id="msg" placeholder="Type...">
<button onclick="send()">Send</button>
</div>

<!-- PROFILE -->
<div class="page" id="profile">
<h3>Profile: {{user}}</h3>

<div class="task">
<h4>Tasks</h4>
<button onclick="checkin()">Daily Check-in</button>
<button onclick="invite()">Invite Friend (5 max)</button>
<div id="taskInfo"></div>
</div>
</div>

<!-- CREATE -->
<div class="page" id="create">

<h3>Create Character</h3>

<h4>1. Basic</h4>
<input placeholder="Name">
<select>
<option>Male</option>
<option>Female</option>
</select>
<input type="file">
<input placeholder="Tags">
<input placeholder="Slogan">
<textarea placeholder="Creator note"></textarea>
<select>
<option>Public</option>
<option>Private</option>
</select>

<h4>2. Public Info (3000)</h4>
<textarea></textarea>

<h4>3. Personality (60000)</h4>
<textarea></textarea>

<h4>4. Intro</h4>
<textarea placeholder="Biography"></textarea>
<textarea placeholder="Opening dialogue"></textarea>

<button>Create</button>

</div>

<!-- NAV -->
<div id="nav">
<div class="navbtn" onclick="openPage('home')">🏠</div>
<div class="navbtn" onclick="openPage('chat')">💬</div>
<div class="navbtn" onclick="openPage('profile')">👤</div>
<div class="navbtn" onclick="openPage('settingsPage')">⚙</div>
</div>

<div id="plus" onclick="openPage('create')">+</div>

<script>

let user = localStorage.getItem("user") || "Guest";
let stars = +localStorage.getItem("stars") || 0;
let inviteCount = +localStorage.getItem("invite") || 0;

/* NAV */
function openPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* HOME */
function renderHome(){
    recom.innerHTML="✨ Suggested Characters...";
}

/* CHAT */
function send(){
    chatbox.innerHTML += "<div>You: "+msg.value+"</div>";
    chatbox.innerHTML += "<div>AI: ...</div>";
    msg.value="";
}

/* DAILY */
function checkin(){
    let day=new Date().getDay();

    if(day===6){
        stars+=100;
    }else{
        stars+=50;
    }

    localStorage.setItem("stars",stars);
    alert("Stars: "+stars);
}

/* INVITE */
function invite(){
    if(inviteCount>=5){
        alert("Max invite reached");
        return;
    }

    inviteCount++;
    stars+=200;

    localStorage.setItem("invite",inviteCount);
    localStorage.setItem("stars",stars);

    taskInfo.innerHTML="Invites: "+inviteCount+"/5 | Stars: "+stars;
}

/* INIT */
taskInfo.innerHTML="Invites: "+inviteCount+"/5 | Stars: "+stars;

</script>

</body>
</html>
