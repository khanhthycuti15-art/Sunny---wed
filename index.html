<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NeoVN AI - Full Game</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#f7fcff,#ffffff);
    color:#222;
}

/* TOP BAR */
#topbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#dff3ff;
}

/* MAIN */
#main{
    display:flex;
    height:92vh;
}

/* CHAR LIST */
#left{
    width:30%;
    border-right:1px solid #ddd;
    padding:10px;
    overflow:auto;
}

.card{
    background:#eaf6ff;
    padding:10px;
    border-radius:12px;
    margin-bottom:8px;
    cursor:pointer;
}
.card:hover{background:#d6efff}

.tag{
    font-size:11px;
    background:#dff1ff;
    padding:2px 6px;
    border-radius:8px;
    margin-right:4px;
}

/* RIGHT */
#right{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:10px;
}

/* SCENE */
#scene{
    flex:1;
    background:#f5fbff;
    border-radius:15px;
    padding:10px;
    overflow:auto;
}

/* CHAT */
#chat{
    height:180px;
    overflow:auto;
    background:white;
    border-radius:12px;
    padding:8px;
    border:1px solid #ddd;
}

input,textarea,select,button{
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#7ec8ff;
    color:white;
    border:none;
    cursor:pointer;
}

/* AFF BAR */
.bar{
    height:10px;
    background:#ddd;
    border-radius:10px;
}
.fill{
    height:100%;
    background:#ff88c2;
}

/* MODE */
.mode{
    display:flex;
    gap:5px;
    margin-bottom:5px;
}
.mbtn{
    flex:1;
    text-align:center;
    padding:6px;
    background:#e3f3ff;
    border-radius:8px;
    cursor:pointer;
}
.mbtn.active{
    background:#7ec8ff;
    color:white;
}
</style>
</head>

<body>

<div id="topbar">
🔎 <input id="search" placeholder="Search character..." oninput="render()">
⭐ <button onclick="daily()">Daily</button>
<span id="stars">0</span>
</div>

<div id="main">

<!-- LEFT -->
<div id="left">

<h3>Create Character</h3>

<input id="name" placeholder="Name">
<input id="avatar" placeholder="Avatar (url)">
<input id="tags" placeholder="Tags: cute, tsun, rich">
<input id="age" placeholder="Age">

<select id="mood">
<option>Gentle</option>
<option>Cold</option>
<option>Tsundere</option>
<option>Yandere light</option>
<option>Friendly</option>
</select>

<textarea id="prompt" placeholder="AI personality prompt"></textarea>

<button onclick="create()">+ Create</button>

<hr>
<div id="list"></div>

</div>

<!-- RIGHT -->
<div id="right">

<div class="mode">
<div class="mbtn active" onclick="setMode('chat')">Chat</div>
<div class="mbtn" onclick="setMode('role')">Roleplay</div>
<div class="mbtn" onclick="setMode('memory')">Memory</div>
<div class="mbtn" onclick="setMode('route')">Route</div>
</div>

<div id="scene">
<div id="info"></div>

<div class="bar"><div class="fill" id="aff"></div></div>

<div id="chat"></div>
</div>

<input id="msg" placeholder="Type...">
<button onclick="send()">Send</button>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("neo_vn_v3")||"{}");
if(!data.chars) data.chars={};
if(!data.stars) data.stars=0;
if(!data.routeProgress) data.routeProgress={};

let current=null;
let mode="chat";

function save(){
    localStorage.setItem("neo_vn_v3",JSON.stringify(data));
    stars.innerText=data.stars;
}
save();

/* CREATE */
function create(){
    let c={
        name:name.value,
        avatar:avatar.value,
        tags:tags.value.split(","),
        age:age.value,
        mood:mood.value,
        prompt:prompt.value,
        affinity:0,
        level:1,
        memory:[],
        chat:[],
        route:"locked"
    };

    if(!c.name) return;

    data.chars[c.name]=c;
    save();
    render();
}

/* LIST */
function render(){
    let q=search.value?.toLowerCase()||"";

    list.innerHTML=Object.values(data.chars)
    .filter(c=>c.name.toLowerCase().includes(q))
    .map(c=>`
        <div class="card" onclick="openChar('${c.name}')">
            <b>${c.name}</b><br>
            ${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}<br>
            ❤️ ${c.affinity} | Lv ${c.level}
        </div>
    `).join("");
}

/* OPEN */
function openChar(n){
    current=data.chars[n];
    renderChat();
}

/* MODE */
function setMode(m){
    mode=m;
    document.querySelectorAll(".mbtn").forEach(x=>x.classList.remove("active"));
    event.target.classList.add("active");
}

/* RENDER */
function renderChat(){
    if(!current) return;

    info.innerHTML=`
        <h2>${current.name}</h2>
        <div>Route: ${current.route}</div>
    `;

    aff.style.width=Math.min(current.affinity*10,100)+"%";

    chat.innerHTML=current.chat.map(m=>"<div>"+m+"</div>").join("");
}

/* AI CORE */
function AI(c,t){

    c.memory.push(t);
    if(c.memory.length>10) c.memory.shift();

    if(mode==="memory"){
        return "Bạn từng nói: " + (c.memory[0]||"...");
    }

    if(mode==="route"){
        if(c.affinity>8){
            c.route="Unlocked Love Route 💖";
        }
        return "Route status: "+c.route;
    }

    if(mode==="role"){
        return "(*roleplay*) " + c.name + " reacts to: " + t;
    }

    if(c.mood==="Tsundere"){
        return t.includes("love") ? "Đ-đừng nói vậy!!" : "Hừ...";
    }

    if(c.mood==="Cold"){
        return "…";
    }

    if(c.affinity>6){
        return "Mình… bắt đầu quan tâm bạn hơn rồi.";
    }

    return "Ừm.";
}

/* SEND */
function send(){
    if(!current) return;

    let t=msg.value;
    if(!t) return;

    current.chat.push("You: "+t);

    let r=AI(current,t);

    current.chat.push(current.name+": "+r);

    if(t.includes("love")||t.includes("cute")){
        current.affinity++;
        current.level = Math.floor(current.affinity/3)+1;
    }

    save();
    msg.value="";
    renderChat();
}

/* DAILY SYSTEM */
function daily(){
    let day=new Date().getDay(); // 0-6

    if(day===0){
        data.stars+=100;
        alert("+100 stars (day 7 bonus)");
    }else{
        data.stars+=50;
        alert("+50 stars");
    }

    save();
}

render();

</script>

</body>
</html>
