<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NeoChat OS</title>
<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e1e2f,#111);
    color:white;
    overflow:hidden;
}

/* Desktop */
#desktop {
    display:flex;
    flex-wrap:wrap;
    padding:20px;
    gap:15px;
}

/* App icon */
.app {
    width:100px;
    height:100px;
    background:#2a2a40;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-direction:column;
}
.app:hover {
    background:#3a3a60;
}

/* Window */
.window {
    position:absolute;
    top:50px;
    left:50px;
    width:360px;
    height:500px;
    background:#1c1c2b;
    border:1px solid #444;
    border-radius:10px;
    display:none;
    flex-direction:column;
}
.titlebar {
    background:#2b2b44;
    padding:10px;
    cursor:move;
}
.content {
    flex:1;
    padding:10px;
    overflow:auto;
}

input, button, textarea {
    width:100%;
    margin-top:5px;
    padding:8px;
    border:none;
    border-radius:5px;
}

button {
    background:#6c63ff;
    color:white;
    cursor:pointer;
}

.chat-box {
    height:300px;
    overflow:auto;
    background:#111;
    padding:5px;
    border-radius:5px;
}

.msg-user { color:#4dd0e1; }
.msg-ai { color:#ffd54f; }

.star {
    color:gold;
}
</style>
</head>
<body>

<div id="desktop">
    <div class="app" onclick="openApp('charApp')">👤<br>Characters</div>
    <div class="app" onclick="openApp('chatApp')">💬<br>Chat</div>
    <div class="app" onclick="dailyReward()">🎁<br>Daily</div>
</div>

<!-- CHARACTER APP -->
<div class="window" id="charApp">
    <div class="titlebar">Create Character</div>
    <div class="content">
        <input id="cName" placeholder="Tên nhân vật">
        <textarea id="cDesc" placeholder="Mô tả tính cách"></textarea>
        <button onclick="createChar()">Tạo</button>
        <div id="charList"></div>
    </div>
</div>

<!-- CHAT APP -->
<div class="window" id="chatApp">
    <div class="titlebar">Chat</div>
    <div class="content">
        <select id="charSelect"></select>
        <div id="affinity"></div>

        <div class="chat-box" id="chatBox"></div>

        <input id="msg" placeholder="Nhập tin nhắn...">
        <button onclick="sendMsg()">Gửi</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("neo_data") || "{}");
if(!data.chars) data.chars = {};
if(!data.stars) data.stars = 0;

function save(){
    localStorage.setItem("neo_data", JSON.stringify(data));
}

function openApp(id){
    document.getElementById(id).style.display="flex";
    if(id==="chatApp") loadChars();
    if(id==="charApp") renderChars();
}

function createChar(){
    let name = cName.value;
    let desc = cDesc.value;
    if(!name) return;

    data.chars[name] = {
        name,
        desc,
        affinity:0,
        chat:[]
    };
    save();
    renderChars();
    alert("Đã tạo nhân vật!");
}

function renderChars(){
    let list = Object.values(data.chars);
    charList.innerHTML = list.map(c=>`
        <div>👤 ${c.name} (❤️ ${c.affinity})</div>
    `).join("");
}

function loadChars(){
    charSelect.innerHTML = Object.keys(data.chars)
    .map(c=>`<option>${c}</option>`).join("");

    updateAffinity();
}

function updateAffinity(){
    let c = data.chars[charSelect.value];
    if(!c) return;
    affinity.innerHTML = "Thiện cảm: " + "⭐".repeat(Math.max(0,c.affinity));
    renderChat();
}

charSelect?.addEventListener("change", updateAffinity);

function sendMsg(){
    let c = data.chars[charSelect.value];
    if(!c) return;

    let text = msg.value;
    if(!text) return;

    c.chat.push("You: " + text);

    // fake AI reply
    let reply = aiReply(text, c);
    c.chat.push(c.name + ": " + reply);

    if(text.includes("cute") || text.includes("yêu")){
        c.affinity++;
    }

    save();
    msg.value="";
    updateAffinity();
}

function aiReply(t, c){
    if(c.affinity > 3){
        return "Mình thích bạn hơn rồi đó...";
    }
    if(t.includes("hello")) return "Xin chào!";
    return "Hmm... mình đang nghe đây.";
}

function renderChat(){
    let c = data.chars[charSelect.value];
    if(!c) return;

    chatBox.innerHTML = c.chat.map(m=>{
        return `<div>${m.includes("You:")?'<span class="msg-user">'+m+'</span>':'<span class="msg-ai">'+m+'</span>'}</div>`;
    }).join("");
}

function dailyReward(){
    let last = localStorage.getItem("last_day");
    let today = new Date().toDateString();

    if(last === today){
        alert("Hôm nay bạn đã nhận rồi!");
        return;
    }

    data.stars += 3;
    localStorage.setItem("last_day", today);
    save();

    alert("Nhận 3 sao!");
}
</script>

</body>
</html>
