<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Neo Doki Style AI</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#f5fbff,#ffffff);
    color:#222;
}

/* TOP BAR */
#topbar{
    display:flex;
    padding:10px;
    background:#dff1ff;
    gap:10px;
    align-items:center;
}

input, select, textarea, button{
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#7ec8ff;
    color:white;
    border:none;
    cursor:pointer;
}

/* LAYOUT */
#container{
    display:flex;
    height:90vh;
}

/* LEFT CHAR PANEL */
#left{
    width:30%;
    border-right:1px solid #ddd;
    padding:10px;
    overflow:auto;
}

/* CHAT PANEL */
#right{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:10px;
}

/* CHAR CARD */
.card{
    background:#eaf6ff;
    padding:10px;
    margin-bottom:8px;
    border-radius:12px;
    cursor:pointer;
}
.card:hover{background:#d8efff}

/* CHAT BOX */
#chatbox{
    flex:1;
    background:#f7fcff;
    border-radius:12px;
    padding:10px;
    overflow:auto;
}

/* MODULES */
#modules{
    display:flex;
    gap:5px;
    margin-bottom:5px;
}

.module{
    flex:1;
    background:#e1f2ff;
    padding:6px;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
}

.module.active{
    background:#7ec8ff;
    color:white;
}

/* AFFINITY BAR */
.bar{
    height:10px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}
.bar-fill{
    height:100%;
    background:#ff8ac6;
}

/* TAG */
.tag{
    display:inline-block;
    padding:2px 6px;
    background:#dff0ff;
    border-radius:8px;
    font-size:11px;
    margin-right:4px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
    🔎 <input id="search" placeholder="Tìm character..." oninput="renderChars()">
    ⭐ <button onclick="daily()">Check-in</button>
    <span id="starBox">0 ⭐</span>
</div>

<div id="container">

<!-- LEFT -->
<div id="left">
    <h3>Tạo Character</h3>

    <input id="name" placeholder="Tên">
    <input id="avatar" placeholder="Avatar URL">
    <input id="tags" placeholder="Tags (cute, tsun, rich...)">
    <input id="age" placeholder="Tuổi">

    <select id="mood">
        <option>Dịu dàng</option>
        <option>Lạnh lùng</option>
        <option>Tsundere</option>
        <option>Yandere nhẹ</option>
        <option>Hiền</option>
    </select>

    <textarea id="desc" placeholder="Mô tả"></textarea>
    <textarea id="prompt" placeholder="AI personality prompt"></textarea>

    <button onclick="createChar()">+ Tạo</button>

    <hr>
    <div id="list"></div>
</div>

<!-- RIGHT -->
<div id="right">

<div id="modules">
    <div class="module active" onclick="setMode('chat')">💬 Chat</div>
    <div class="module" onclick="setMode('role')">🎭 Roleplay</div>
    <div class="module" onclick="setMode('memory')">🧠 Memory</div>
    <div class="module" onclick="setMode('love')">💗 Affection</div>
</div>

<div id="info"></div>
<div class="bar"><div class="bar-fill" id="affBar"></div></div>

<div id="chatbox"></div>

<input id="msg" placeholder="Nhập tin nhắn...">
<button onclick="send()">Gửi</button>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("neo_doki_v2")||"{}");
if(!data.chars) data.chars={};
if(!data.stars) data.stars=0;
if(!data.day) data.day=0;

let current=null;
let mode="chat";

function save(){
    localStorage.setItem("neo_doki_v2",JSON.stringify(data));
    starBox.innerText=data.stars+" ⭐";
}

save();

/* CREATE CHAR */
function createChar(){
    let c={
        name:name.value,
        avatar:avatar.value,
        tags:tags.value.split(","),
        age:age.value,
        mood:mood.value,
        desc:desc.value,
        prompt:prompt.value,
        affinity:0,
        memory:[],
        chat:[]
    };

    if(!c.name) return;

    data.chars[c.name]=c;
    save();
    renderChars();
}

/* RENDER LIST */
function renderChars(){
    let q=search.value?.toLowerCase()||"";

    list.innerHTML=Object.values(data.chars)
    .filter(c=>c.name.toLowerCase().includes(q) || c.tags.join(",").includes(q))
    .map(c=>`
        <div class="card" onclick="openChar('${c.name}')">
            <b>${c.name}</b><br>
            <div>${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
            ❤️ ${c.affinity}
        </div>
    `).join("");
}

/* OPEN CHAR */
function openChar(name){
    current=data.chars[name];
    renderChat();
}

/* MODE */
function setMode(m){
    mode=m;
    document.querySelectorAll(".module").forEach(x=>x.classList.remove("active"));
    event.target.classList.add("active");
}

/* CHAT RENDER */
function renderChat(){
    if(!current) return;

    info.innerHTML=`<h3>${current.name}</h3>`;

    affBar.style.width=Math.min(current.affinity*10,100)+"%";

    chatbox.innerHTML=current.chat.map(m=>"<div>"+m+"</div>").join("");
}

/* SEND */
function send(){
    if(!current) return;

    let t=msg.value;
    if(!t) return;

    current.chat.push("🧑 Bạn: "+t);
    current.memory.push(t);

    let reply=AI(current,t);

    current.chat.push("💬 "+current.name+": "+reply);

    if(t.includes("cute")||t.includes("yêu")) current.affinity++;

    save();
    msg.value="";
    renderChat();
}

/* AI ENGINE */
function AI(c,t){

    if(mode=="role"){
        return "(*đang nhập vai*) " + c.name + " phản ứng với: " + t;
    }

    if(mode=="memory"){
        return "Mình nhớ bạn từng nói: " + (c.memory[c.memory.length-2]||"...");
    }

    if(mode=="love"){
        if(c.affinity>5) return "Mình… thích bạn nhiều hơn rồi.";
        return "Hừ…";
    }

    if(c.mood=="Tsundere"){
        return t.includes("yêu") ? "Đ-đừng nói vậy!!" : "Hừ…";
    }

    if(c.mood=="Lạnh lùng"){
        return "…";
    }

    if(c.mood=="Dịu dàng"){
        return "Mình đang nghe bạn 💙";
    }

    return "Ừm.";
}

/* DAILY SYSTEM */
function daily(){
    let today=new Date().getDate();

    if(data.day===today){
        alert("Hôm nay nhận rồi!");
        return;
    }

    data.day=today;

    if(today%7===0){
        data.stars+=100;
        alert("+100 sao (ngày 7)");
    }else{
        data.stars+=50;
        alert("+50 sao");
    }

    save();
}

/* INIT */
renderChars();

</script>

</body>
</html>
