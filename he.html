<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lumi VN Engine</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0b18;
    color: white;
}

#game {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

#scene {
    height: 60vh;
    background: #14162a;
    border-radius: 12px;
    padding: 15px;
    overflow-y: auto;
    border: 1px solid #2c2f55;
}

.line {
    margin: 8px 0;
}

.char {
    color: #fda4af;
}

.user {
    color: #7dd3fc;
    text-align: right;
}

#choices button {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2a2d55;
    color: white;
    cursor: pointer;
}

#status {
    font-size: 13px;
    color: #a1a1aa;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div id="game">

<div id="status"></div>

<div id="scene"></div>

<div id="choices"></div>

</div>

<script>

/* ======================
   CHARACTER STATE
====================== */

let state = {
    mood: "lạnh",
    affection: 50,
    memory: [],
    scene: 0
};

/* ======================
   SCENES (VISUAL NOVEL)
====================== */

let scenes = [
{
    text: "Cô ấy đang đứng dưới mưa, nhìn bạn im lặng.",
    choices: [
        { text: "Đến gần cô ấy", effect: "warm" },
        { text: "Đứng nhìn từ xa", effect: "cold" },
        { text: "Trêu cô ấy", effect: "tease" }
    ]
},
{
    text: "Cô ấy quay lại nhìn bạn.",
    choices: [
        { text: "Xin lỗi", effect: "sorry" },
        { text: "Không nói gì", effect: "silent" },
        { text: "Nắm tay cô ấy", effect: "touch" }
    ]
},
{
    text: "Không khí trở nên im lặng hơn bao giờ hết.",
    choices: [
        { text: "Kết thúc câu chuyện", effect: "end" }
    ]
}
];

/* ======================
   SAVE / LOAD
====================== */

function save() {
    localStorage.setItem("lumi_vn", JSON.stringify(state));
}

function load() {
    let data = JSON.parse(localStorage.getItem("lumi_vn") || "null");
    if (data) state = data;
}

/* ======================
   MOOD ENGINE
====================== */

function updateState(effect) {

    if (effect === "warm") {
        state.mood = "làm nũng";
        state.affection += 10;
    }

    if (effect === "cold") {
        state.mood = "lạnh";
        state.affection -= 10;
    }

    if (effect === "tease") {
        state.mood = "ghen";
        state.affection -= 5;
    }

    if (effect === "sorry") {
        state.mood = "dịu";
        state.affection += 8;
    }

    if (effect === "touch") {
        state.mood = "xao động";
        state.affection += 15;
    }

    if (effect === "end") {
        state.mood = "trống rỗng";
    }

    state.affection = Math.max(0, Math.min(100, state.affection));
}

/* ======================
   RENDER SCENE
====================== */

let sceneBox = document.getElementById("scene");
let choiceBox = document.getElementById("choices");

function render() {

    let sc = scenes[state.scene];

    document.getElementById("status").innerText =
        `Mood: ${state.mood} | Affection: ${state.affection}`;

    sceneBox.innerHTML = "";

    // memory influence text
    let memoryHint = "";
    if (state.affection > 70) memoryHint = "Cô ấy có vẻ đã tin bạn hơn trước...";
    if (state.affection < 30) memoryHint = "Cô ấy giữ khoảng cách với bạn...";

    let div = document.createElement("div");
    div.className = "line char";
    div.innerText = sc.text + "\n" + memoryHint;
    sceneBox.appendChild(div);

    renderChoices(sc.choices);

    save();
}

/* ======================
   CHOICES SYSTEM
====================== */

function renderChoices(choices) {
    choiceBox.innerHTML = "";

    choices.forEach(c => {
        let btn = document.createElement("button");
        btn.innerText = c.text;

        btn.onclick = () => {
            choose(c.effect);
        };

        choiceBox.appendChild(btn);
    });
}

/* ======================
   CHOICE LOGIC
====================== */

function choose(effect) {

    updateState(effect);

    state.memory.push(effect);

    // change scene logic
    if (state.scene < scenes.length - 1) {
        state.scene++;
    } else {
        state.scene = 0;
    }

    render();
}

/* ======================
   INIT
====================== */

load();
render();

</script>

</body>
</html>
