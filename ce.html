<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lumi Character Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0c1a;
    color: white;
}

#app {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    display: flex;
    gap: 15px;
}

#left, #right {
    flex: 1;
}

.panel {
    background: #15172b;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #2a2d55;
}

button, input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 5px;
    width: 100%;
}

#chat {
    height: 55vh;
    overflow-y: auto;
    background: #101226;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #2a2d55;
}

.msg {
    margin: 8px 0;
}

.user { text-align: right; color: #7dd3fc; }
.bot { text-align: left; color: #fda4af; }

small { color: gray; }
</style>
</head>

<body>

<div id="app">

<!-- LEFT: CHAR MENU -->
<div id="left" class="panel">

<h3>👥 Nhân vật</h3>

<select id="charSelect" onchange="switchChar()"></select>

<hr>

<h4>➕ Tạo nhân vật</h4>
<input id="newName" placeholder="Tên nhân vật">
<button onclick="createChar()">Tạo</button>

<hr>

<h4>⭐ Sao năng lượng</h4>
<div id="stars"></div>

</div>

<!-- RIGHT: CHAT -->
<div id="right" class="panel">

<h3>💬 Chat</h3>

<div id="chat"></div>

<input id="input" placeholder="Nhập tin nhắn...">
<button onclick="send()">Gửi</button>

</div>

</div>

<script>

/* ======================
   DATA SYSTEM
====================== */

let data = {
    characters: {
        Luna: createChar("dịu dàng"),
        Noir: createChar("lạnh lùng")
    },
    current: "Luna",
    stars: 10
};

function createChar(mood) {
    return {
        mood: mood,
        memory: [],
        affection: 50
    };
}

/* ======================
   LOAD / SAVE
====================== */

function save() {
    localStorage.setItem("lumi_hub", JSON.stringify(data));
}

function load() {
    let d = JSON.parse(localStorage.getItem("lumi_hub"));
    if (d) data = d;
}

/* ======================
   UI INIT
====================== */

let chatBox = document.getElementById("chat");

function updateCharList() {
    let sel = document.getElementById("charSelect");
    sel.innerHTML = "";

    for (let name in data.characters) {
        let opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        sel.appendChild(opt);
    }

    sel.value = data.current;
}

/* ======================
   STAR SYSTEM
====================== */

function renderStars() {
    document.getElementById("stars").innerText =
        "⭐ " + data.stars + " sao";
}

/* ======================
   CHAT RENDER
====================== */

function renderChat() {
    chatBox.innerHTML = "";

    let c = data.characters[data.current];

    c.memory.forEach(m => {
        let div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerText = (m.role === "user" ? "Bạn: " : data.current + ": ") + m.text;
        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ======================
   AI RESPONSE
====================== */

function reply(char, text) {

    char.memory.push({ role: "user", text });

    let mood = char.mood;
    let aff = char.affection;

    let res = "";

    if (data.stars <= 0) {
        return "Bạn hết sao rồi, chờ hồi phục năng lượng ⭐";
    }

    data.stars--;

    if (text.includes("yêu")) {
        char.affection += 10;
        char.mood = "làm nũng";
        res = "Bạn vừa nói gì vậy...? 💕";
    }
    else if (text.includes("ghen")) {
        char.mood = "ghen";
        char.affection -= 5;
        res = "Tôi không thích điều đó...";
    }
    else if (text.includes("bỏ")) {
        char.mood = "lạnh";
        char.affection -= 10;
        res = "Vậy thì thôi.";
    }
    else if (char.affection > 80) {
        res = "Tôi… thích bạn nhiều hơn tôi nghĩ.";
    }
    else if (char.affection < 30) {
        res = "Đừng nói chuyện với tôi nữa.";
    }
    else if (char.mood === "lạnh") {
        res = "Ừ.";
    }
    else {
        res = "Tôi đang nghe bạn.";
    }

    char.memory.push({ role: "bot", text: res });

    return res;
}

/* ======================
   SEND MESSAGE
====================== */

function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    let c = data.characters[data.current];

    c.memory.push({ role: "user", text });

    let bot = reply(c, text);

    c.memory.push({ role: "bot", text: bot });

    input.value = "";

    save();
    renderChat();
    renderStars();
}

/* ======================
   SWITCH CHAR
====================== */

function switchChar() {
    data.current = document.getElementById("charSelect").value;
    save();
    renderChat();
}

/* ======================
   CREATE CHAR
====================== */

function createChar() {
    let name = document.getElementById("newName").value.trim();
    if (!name) return;

    if (data.characters[name]) {
        alert("Nhân vật đã tồn tại!");
        return;
    }

    data.characters[name] = createChar("lạnh lùng");
    data.current = name;

    updateCharList();
    save();

    renderChat();
}

/* ======================
   INIT
====================== */

load();
updateCharList();
renderChat();
renderStars();

</script>

</body>
</html>
