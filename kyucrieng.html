<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Doki Memory Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f1a;
    color: white;
}
#app {
    max-width: 750px;
    margin: auto;
    padding: 20px;
}
#top {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
}
select, input, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
}
#chat {
    height: 65vh;
    overflow-y: auto;
    border: 1px solid #333;
    padding: 10px;
    border-radius: 10px;
    background: #151525;
}
.msg {
    margin: 8px 0;
}
.user { text-align: right; color: #7dd3fc; }
.bot { text-align: left; color: #fca5a5; }

small {
    color: gray;
    display: block;
    margin-top: 2px;
}
</style>

</head>

<body>
<div id="app">

<div id="top">
    <select id="charSelect" onchange="switchChar()">
        <option value="Yuna">Yuna (ngọt ngào)</option>
        <option value="Rin">Rin (lạnh lùng)</option>
        <option value="Mika">Mika (ghen nhẹ)</option>
    </select>
</div>

<div id="chat"></div>

<div style="margin-top:10px;">
    <input id="input" placeholder="Nhập tin nhắn...">
    <button onclick="send()">Gửi</button>
</div>

</div>

<script>
/* =========================
   CHARACTER DATA
========================= */

let characters = {
    Yuna: {
        mood: "ngọt ngào",
        memory: []
    },
    Rin: {
        mood: "lạnh lùng",
        memory: []
    },
    Mika: {
        mood: "ghen nhẹ",
        memory: []
    }
};

let currentChar = "Yuna";

/* =========================
   LOAD MEMORY FROM STORAGE
========================= */

function loadMemory() {
    let data = JSON.parse(localStorage.getItem("doki_memory") || "{}");
    characters = { ...characters, ...data };
}

function saveMemory() {
    localStorage.setItem("doki_memory", JSON.stringify(characters));
}

/* =========================
   CHAT RENDER
========================= */

let chatBox = document.getElementById("chat");

function render() {
    chatBox.innerHTML = "";

    let mem = characters[currentChar].memory;

    mem.forEach(m => {
        let div = document.createElement("div");
        div.className = "msg " + m.role;

        let text = document.createElement("div");
        text.innerText = m.text;

        div.appendChild(text);

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================
   BOT LOGIC (có memory)
========================= */

function botReply(userText) {
    let char = characters[currentChar];

    // nhớ user nói gì
    char.memory.push({ role: "user", text: userText });

    let reply = "";

    // đọc memory để phản ứng
    let past = char.memory.slice(-5).map(m => m.text).join(" ");

    if (past.includes("yêu")) {
        reply = "Bạn lại nói vậy nữa à... 😳 tôi nhớ rồi đó";
    }
    else if (past.includes("ghen")) {
        reply = "Tôi đã ghi nhớ chuyện đó... đừng làm tôi khó chịu nữa.";
    }
    else if (past.includes("buồn")) {
        reply = "Tôi vẫn nhớ bạn đã buồn trước đó... tôi ở đây.";
    }
    else {
        reply = getBaseReply(char.mood);
    }

    char.memory.push({ role: "bot", text: reply });

    saveMemory();

    return reply;
}

/* =========================
   BASE REPLY BY MOOD
========================= */

function getBaseReply(mood) {
    if (mood === "ngọt ngào") return "Hmm... bạn dễ thương đó 💕";
    if (mood === "lạnh lùng") return "Ừ. Tôi nghe.";
    if (mood === "ghen nhẹ") return "Bạn đang nói chuyện với ai vậy...? 😒";
    return "Tôi đang nghe.";
}

/* =========================
   SEND MESSAGE
========================= */

function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    let char = characters[currentChar];

    char.memory.push({ role: "user", text });

    let bot = botReply(text);

    char.memory.push({ role: "bot", text: bot });

    saveMemory();

    input.value = "";
    render();
}

/* =========================
   SWITCH CHARACTER
========================= */

function switchChar() {
    currentChar = document.getElementById("charSelect").value;
    render();
}

/* =========================
   INIT
========================= */

loadMemory();
render();

</script>

</body>
</html>
